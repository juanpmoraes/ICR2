{% extends "base.html" %}

{% block content %}
<div class="header-section" style="margin-bottom: 2rem;">
    <h1 style="color: var(--primary);"><i class="fa-solid fa-user-pen"></i> Meu Perfil</h1>
    <p style="color: var(--text-muted);">Edite suas informações pessoais</p>
</div>

<div class="card glass" style="max-width: 600px;">
    <form method="POST" action="">
        <div class="form-group">
            <label for="name">Nome Completo</label>
            <input type="text" id="name" name="name" class="form-control" value="{{ current_user.name }}" required>
        </div>
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" class="form-control" value="{{ current_user.email }}" readonly style="opacity: 0.7;">
            <small style="color: var(--text-muted);">O e-mail não pode ser alterado no momento.</small>
        </div>
        <div class="form-group">
            <label>Papel na Igreja</label>
            <input type="text" class="form-control" value="{{ current_user.role|capitalize }}" readonly style="opacity: 0.7;">
        </div>
        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Salvar Alterações</button>
    </form>
</div>
{% endblock %}
