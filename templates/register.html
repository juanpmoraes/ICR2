{% extends "base.html" %}

{% block auth_content %}
<div class="card glass" style="width: 400px;">
    <h2 class="card-title text-center" style="text-align: center;">Criar Conta</h2>
    <form method="POST" action="">
        <div class="form-group">
            <label for="name">Nome Completo</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="João Silva">
        </div>
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label for="church_id">Igreja</label>
            <select id="church_id" name="church_id" class="form-control" required style="background:var(--bg-dark); color:var(--text-main);">
                <option value="" disabled selected>Selecione sua Igreja</option>
                {% for c in churches %}
                <option value="{{ c.id }}">{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Sua senha secreta">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Cadastrar</button>
    </form>
    <div style="text-align: center; margin-top: 1.5rem;">
        <small style="color: var(--text-muted);">Já tem uma conta? <a href="{{ url_for('login') }}" style="color: var(--primary);">Faça login</a></small>
    </div>
</div>
{% endblock %}
