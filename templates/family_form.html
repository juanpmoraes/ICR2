{% extends "base.html" %}
{% block content %}
<div style="margin-bottom:2rem;">
    <a href="{{ url_for('families') }}" style="color:var(--primary);text-decoration:none;"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
    <h1 style="color:var(--primary);margin-top:.5rem;"><i class="fa-solid fa-people-roof"></i></h1>
</div>
<div class="card glass" style="max-width:500px;">
    <h3 style="color:var(--primary);margin-bottom:1.5rem;">{{ action }} Família</h3>
    <form method="POST" action="">
        <div class="form-group">
            <label>Nome da Família</label>
            <input type="text" name="name" class="form-control" required value="{{ f.name if f else '' }}" placeholder="Ex: Família Silva">
        </div>
        <div class="form-group">
            <label>Descrição (opcional)</label>
            <textarea name="description" class="form-control" rows="3" placeholder="Uma breve descrição da família...">{{ f.description if f else '' }}</textarea>
        </div>
        <div style="display:flex;gap:1rem;">
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
            <a href="{{ url_for('families') }}" class="btn" style="background:rgba(255,255,255,0.1);color:var(--text-main);">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
