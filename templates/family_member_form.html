{% extends "base.html" %}
{% block content %}
<div style="margin-bottom:2rem;">
    <a href="{{ url_for('family_detail', fid=f.id) }}" style="color:var(--primary);text-decoration:none;"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
    <h1 style="color:var(--primary);margin-top:.5rem;">{{ action }} Membro — Família {{ f.name }}</h1>
</div>
<div class="card glass" style="max-width:600px;">
    <form method="POST" action="">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="form-group" style="grid-column:1/-1;">
                <label>Nome completo *</label>
                <input type="text" name="name" class="form-control" required value="{{ m.name if m else '' }}" placeholder="Ex: João da Silva">
            </div>
            <div class="form-group">
                <label>Papel na família</label>
                <select name="role" class="form-control" style="appearance:none;background:rgba(0,0,0,0.3);">
                    {% for r in ['Chefe de família','Cônjuge','Filho','Filha','Pai','Mãe','Avô','Avó','Neto','Neta','Bisneto','Bisneta','Tio','Tia','Sobrinho','Sobrinha','Outro'] %}
                    <option value="{{ r }}" {% if m and m.role == r %}selected{% endif %} style="color:black;">{{ r }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Gênero</label>
                <select name="gender" class="form-control" style="appearance:none;background:rgba(0,0,0,0.3);">
                    <option value="masculino" {% if m and m.gender == 'masculino' %}selected{% endif %} style="color:black;">Masculino</option>
                    <option value="feminino"  {% if m and m.gender == 'feminino'  %}selected{% endif %} style="color:black;">Feminino</option>
                    <option value="outro"     {% if m and m.gender == 'outro'     %}selected{% endif %} style="color:black;">Outro</option>
                </select>
            </div>
            <div class="form-group">
                <label>Data de Nascimento</label>
                <input type="date" name="birth_date" class="form-control" value="{{ m.birth_date.strftime('%Y-%m-%d') if m and m.birth_date else '' }}">
            </div>
            <div class="form-group">
                <label>Pai/Mãe na árvore (opcional)</label>
                <select name="parent_id" class="form-control" style="appearance:none;background:rgba(0,0,0,0.3);">
                    <option value="" style="color:black;">— Raiz (sem pai/mãe) —</option>
                    {% for e in existing %}
                    <option value="{{ e.id }}" {% if m and m.parent_id == e.id %}selected{% endif %} style="color:black;">
                        {{ e.name }} ({{ e.role }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Vincular conta do sistema (opcional)</label>
                <select name="user_id" class="form-control" style="appearance:none;background:rgba(0,0,0,0.3);">
                    <option value="" style="color:black;">— Sem vínculo —</option>
                    {% for u in all_users %}
                    <option value="{{ u.id }}" {% if m and m.user_id == u.id %}selected{% endif %} style="color:black;">
                        {{ u.name }} ({{ u.email }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group" style="grid-column:1/-1;">
                <label>Observações</label>
                <textarea name="notes" class="form-control" rows="2" placeholder="Informações extras...">{{ m.notes if m else '' }}</textarea>
            </div>
        </div>
        <div style="display:flex;gap:1rem;margin-top:.5rem;">
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
            <a href="{{ url_for('family_detail', fid=f.id) }}" class="btn" style="background:rgba(255,255,255,0.1);color:var(--text-main);">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
