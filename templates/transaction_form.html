{% extends "base.html" %}

{% block content %}
<div style="margin-bottom:2rem;">
    <a href="{{ url_for('finance') }}" style="color:var(--primary);text-decoration:none;"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
    <h1 style="color:var(--primary);margin-top:.5rem;"><i class="fa-solid fa-money-bill-transfer"></i> {{ action }} Transação</h1>
</div>

<div class="card glass" style="max-width:600px;">
    <form method="POST" action="">
        <div class="form-group">
            <label>Tipo</label>
            <select name="type" class="form-control" style="appearance:none;background:rgba(0,0,0,0.3);" required>
                {% for tipo in ['dizimo','oferta','entrada','gasto','divida'] %}
                <option value="{{ tipo }}" {% if t and t.type == tipo %}selected{% endif %} style="color:black;text-transform:capitalize;">{{ tipo|capitalize }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Valor (R$)</label>
            <input type="number" step="0.01" min="0.01" name="amount" class="form-control" required
                   value="{{ t.amount if t else '' }}" placeholder="100.00">
        </div>
        <div class="form-group">
            <label>Descrição</label>
            <input type="text" name="description" class="form-control"
                   value="{{ t.description if t else '' }}" placeholder="Observações (opcional)">
        </div>
        <div class="form-group">
            <label>Status</label>
            <select name="status" class="form-control" style="appearance:none;background:rgba(0,0,0,0.3);">
                <option value="completed" {% if t and t.status == 'completed' %}selected{% endif %} style="color:black;">Completo</option>
                <option value="pending"   {% if t and t.status == 'pending'   %}selected{% endif %} style="color:black;">Pendente</option>
            </select>
        </div>
        <div style="display:flex;gap:1rem;">
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
            <a href="{{ url_for('finance') }}" class="btn" style="background:rgba(255,255,255,0.1);color:var(--text-main);">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
