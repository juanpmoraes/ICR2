{% extends "base.html" %}
{% block content %}
<div class="card glass" style="max-width:700px; margin:0 auto;">
    <div style="margin-bottom:2rem;">
        <a href="{{ url_for('superadmin_users') }}" style="color:var(--primary);text-decoration:none;"><i class="fa-solid fa-arrow-left"></i> Voltar para Usuários</a>
        <h2 class="card-title" style="margin-top:.5rem;"><i class="fa-solid fa-user-plus"></i> Adicionar Usuário Global</h2>
    </div>

    <form method="POST">
        <h3 style="color:var(--primary);margin-bottom:1rem;">Informações Básicas</h3>
        <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Senha Inicial</label>
            <input type="password" name="password" class="form-control" required minlength="6">
        </div>

        <hr style="border:0; border-top:1px solid var(--glass-border); margin:2rem 0;">

        <h3 style="color:var(--primary);margin-bottom:1rem;">Alocação e Permissões</h3>
        
        <div class="form-group">
            <label>Igreja</label>
            <select name="church_id" class="form-control" style="background:var(--bg-dark); color:var(--text-main);">
                <option value="">-- Nenhuma Igreja --</option>
                {% for c in churches %}
                <option value="{{ c.id }}">{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Cargo na Igreja</label>
            <select name="role" class="form-control" style="background:var(--bg-dark); color:var(--text-main);">
                <option value="membro">Membro</option>
                <option value="pastor">Pastor (Gerente da Igreja)</option>
            </select>
        </div>

        <div style="display:flex; flex-direction:column; gap:1rem; margin-top:1.5rem; background:rgba(0,0,0,0.2); padding:1rem; border-radius:10px;">
            <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
                <input type="checkbox" name="is_approved" value="1" checked style="width:1.2rem; height:1.2rem;">
                <span style="font-weight:600;">Aprovado para acessar o sistema</span>
            </label>

            <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
                <input type="checkbox" name="is_superadmin" value="1" style="width:1.2rem; height:1.2rem;">
                <span style="font-weight:600; color:#ef5350;">Acesso Superadmin Global</span>
            </label>
        </div>

        <div style="margin-top:2.5rem; display:flex; gap:1rem;">
            <a href="{{ url_for('superadmin_users') }}" class="btn" style="background:rgba(255,255,255,0.1); color:var(--text-main);">Cancelar</a>
            <button type="submit" class="btn btn-primary" style="flex:1;"><i class="fa-solid fa-plus"></i> Cadastrar Usuário</button>
        </div>
    </form>
</div>
{% endblock %}
