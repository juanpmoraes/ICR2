{% extends "base.html" %}

{% block content %}
<div style="margin-bottom:2rem;">
    <a href="{{ url_for('bills') }}" style="color:var(--primary);text-decoration:none;"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
    <h1 style="color:var(--primary);margin-top:.5rem;"><i class="fa-solid fa-file-invoice"></i> {{ action }} Conta a Pagar</h1>
</div>

<div class="card glass" style="max-width:600px;">
    <form method="POST" action="">
        <div class="form-group">
            <label>Descrição</label>
            <input type="text" name="description" class="form-control" required
                   value="{{ b.description if b else '' }}" placeholder="Ex: Conta de energia">
        </div>
        <div class="form-group">
            <label>Valor (R$)</label>
            <input type="number" step="0.01" min="0.01" name="amount" class="form-control" required
                   value="{{ b.amount if b else '' }}" placeholder="150.00">
        </div>
        <div class="form-group">
            <label>Data de Vencimento</label>
            <input type="date" name="due_date" class="form-control" required
                   value="{{ b.due_date.strftime('%Y-%m-%d') if b else '' }}">
        </div>
        <div class="form-group">
            <label>Categoria</label>
            <select name="category" class="form-control" style="appearance:none;background:rgba(0,0,0,0.3);">
                {% for cat in ['Aluguel','Energia','Água','Internet','Salário','Manutenção','Evento','Missões','Outros'] %}
                <option value="{{ cat }}" {% if b and b.category == cat %}selected{% endif %} style="color:black;">{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
        {% if b %}
        <div class="form-group">
            <label>Status</label>
            <select name="status" class="form-control" style="appearance:none;background:rgba(0,0,0,0.3);">
                <option value="pendente" {% if b.status == 'pendente' %}selected{% endif %} style="color:black;">Pendente</option>
                <option value="pago"     {% if b.status == 'pago'     %}selected{% endif %} style="color:black;">Pago</option>
                <option value="atrasado" {% if b.status == 'atrasado' %}selected{% endif %} style="color:black;">Atrasado</option>
            </select>
        </div>
        {% endif %}
        <div style="display:flex;gap:1rem;">
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
            <a href="{{ url_for('bills') }}" class="btn" style="background:rgba(255,255,255,0.1);color:var(--text-main);">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
